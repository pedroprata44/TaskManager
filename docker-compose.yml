version: '3.8'

services:
  frontend:
    image: node:20-alpine
    working_dir: /app/taskmanager-frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=https://host.docker.internal:5001/api
    networks:
      - taskmanager

networks:
  taskmanager:
    driver: bridge
